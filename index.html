<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Simon Song</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace; }
    ::selection { background: rgba(0,0,0,0.12); }
    @keyframes blinkCursor { 0%, 45% { opacity: 1; } 50%, 95% { opacity: 0; } 100% { opacity: 1; } }
  </style>
</helmet>

<div style="background:oklch(0.98 0.006 85); color:oklch(0.2 0.01 85); min-height:100vh; width:100%; display:flex; flex-direction:column;">

  <header style="display:flex; align-items:center; justify-content:space-between; padding:32px 40px;">
    <span style="display:flex; align-items:center; gap:12px;">
      <span style="width:32px; height:32px; border:1.5px solid oklch(0.2 0.01 85); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;">SS</span>
      <span style="font-weight:600; font-size:14px; letter-spacing:0.01em;">Simon Song</span>
    </span>
  </header>

  <main style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px;">
    <p style="margin:0 0 24px; font-size:13px; letter-spacing:0.03em; color:{{ accent }}; font-weight:600;">// backend engineer</p>

    <h1 style="margin:0 0 28px; font-weight:700; letter-spacing:-0.02em; line-height:1.05; color:oklch(0.16 0.01 85); font-size:clamp(40px, 7vw, 92px);">
      Automate <span style="color:oklch(0.16 0.01 85);">{{ typedText }}</span><span style="animation:blinkCursor 1.1s steps(1) infinite; color:{{ accent }};">_</span>
    </h1>

    <p style="margin:0 0 48px; font-size:16px; line-height:1.6; color:oklch(0.42 0.01 85); max-width:520px;">I build systems that automate the things around me — at work, at home, and in my own projects.</p>

    <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:16px;">
      <a href="portfolio.html" style="text-decoration:none; background:{{ accent }}; color:oklch(0.99 0.005 85); font-size:14px; font-weight:600; padding:13px 26px;">Portfolio ↗</a>
      <a href="personal-projects.html" style="text-decoration:none; border:1px solid oklch(0.7 0.01 85); color:oklch(0.2 0.01 85); font-size:14px; font-weight:600; padding:13px 26px;" style-hover="border-color:oklch(0.2 0.01 85);">Personal Projects ↗</a>
    </div>
  </main>

  <footer style="display:flex; justify-content:space-between; align-items:center; padding:24px 40px; font-size:12px; color:oklch(0.55 0.01 85);">
    <span>© {{ year }} Simon Song</span>
    <a href="mailto:songsb13@gmail.com" style="color:oklch(0.55 0.01 85); text-decoration:none;" style-hover="color:{{ accent }};">songsb13@gmail.com</a>
  </footer>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 },
  &quot;accentColor&quot;: {
    &quot;editor&quot;: &quot;color&quot;,
    &quot;default&quot;: [&quot;oklch(0.55 0.13 152)&quot;, &quot;oklch(0.94 0.035 152)&quot;],
    &quot;tsType&quot;: &quot;string[]&quot;,
    &quot;options&quot;: [
      [&quot;oklch(0.55 0.13 152)&quot;, &quot;oklch(0.94 0.035 152)&quot;],
      [&quot;oklch(0.55 0.13 250)&quot;, &quot;oklch(0.94 0.035 250)&quot;],
      [&quot;oklch(0.6 0.14 70)&quot;, &quot;oklch(0.95 0.035 70)&quot;],
      [&quot;oklch(0.55 0.13 20)&quot;, &quot;oklch(0.95 0.03 20)&quot;]
    ]
  }
}">
class Component extends DCLogic {
  state = { typedText: "" };

  words = ["Life", "Work", "World"];
  wordIdx = 0;
  charIdx = 0;

  TYPE_MS = 110;
  DELETE_MS = 55;
  HOLD_MS = 800;
  NEXT_WORD_MS = 250;
  LOOP_WAIT_MS = 5000;

  componentDidMount() {
    this._timer = setTimeout(() => this.typeStep(), this.TYPE_MS);
  }

  componentWillUnmount() {
    clearTimeout(this._timer);
  }

  typeStep() {
    const word = this.words[this.wordIdx];
    this.charIdx += 1;
    this.setState({ typedText: word.slice(0, this.charIdx) });
    if (this.charIdx < word.length) {
      this._timer = setTimeout(() => this.typeStep(), this.TYPE_MS);
    } else {
      const isLastWord = this.wordIdx === this.words.length - 1;
      this._timer = setTimeout(() => this.deleteStep(), isLastWord ? this.LOOP_WAIT_MS : this.HOLD_MS);
    }
  }

  deleteStep() {
    const word = this.words[this.wordIdx];
    this.charIdx -= 1;
    this.setState({ typedText: word.slice(0, this.charIdx) });
    if (this.charIdx > 0) {
      this._timer = setTimeout(() => this.deleteStep(), this.DELETE_MS);
    } else {
      this.wordIdx = this.wordIdx < this.words.length - 1 ? this.wordIdx + 1 : 0;
      this._timer = setTimeout(() => this.typeStep(), this.NEXT_WORD_MS);
    }
  }

  renderVals() {
    const accentPalette = this.props.accentColor ?? ["oklch(0.55 0.13 152)", "oklch(0.94 0.035 152)"];
    const accent = accentPalette[0];

    return {
      accent: accent,
      typedText: this.state.typedText,
      year: new Date().getFullYear()
    };
  }
}
</script>
</body>
</html>
